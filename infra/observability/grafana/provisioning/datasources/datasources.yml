apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: Prometheus
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 10s
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo

  - name: Loki
    type: loki
    access: proxy
    uid: loki
    url: http://loki:3100
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: "\"traceId\":\"(\\w+)\""
          name: TraceID
          url: "$${__value.raw}"

  - name: Tempo
    type: tempo
    access: proxy
    uid: tempo
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -2m
        spanEndTimeShift: 2m
        filterByTraceID: true
        tags:
          - { key: service.name, value: service }
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
