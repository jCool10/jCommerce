# Tails every docker container's stdout/stderr, parses the JSON line
# produced by Pino, and ships to Loki. Container `name` becomes the
# `service` label so Grafana can filter per app.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # Strip leading `/` from docker container names.
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      # Default service = container name; Pino's `service` field (parsed
      # below) wins via pipeline stage and overrides this baseline.
      - source_labels: ["__meta_docker_container_name"]
        regex: "/jcool-(.+)"
        target_label: service
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            correlationId: correlationId
            traceId: traceId
            orderId: orderId
            userId: userId
            msg: msg
      - labels:
          level:
          service:
      - timestamp:
          source: time
          format: RFC3339Nano
          fallback_formats:
            - UnixMs
            - RFC3339
