# Local observability stack — Grafana + Prometheus + Loki + Promtail + Tempo.
# Boots independently of infra/docker-compose.yml so devs can opt-in / out.
# Apps must run on host (or in another compose project on the same docker
# network "host" reachable via host.docker.internal — works on macOS / WSL2).
#
# Add ~1.5GB RAM on top of infra docker-compose. For 8GB machines, skip
# Tempo via the `o11y-up-lite` target.

name: jcool-o11y

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: jcool-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=24h
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:3.2.1
    container_name: jcool-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.2.1
    container_name: jcool-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Tail docker container logs (requires Linux/WSL2/macOS-with-Docker-Desktop).
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.6.1
    container_name: jcool-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    ports:
      - "3200:3200"   # tempo UI / query
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP — apps send here
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo-data:/var/tempo

  grafana:
    image: grafana/grafana:11.3.0
    container_name: jcool-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
